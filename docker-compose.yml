version: '3.8'

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: bank-app-red-project
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - '5433:5432'
    volumes:
      - bank_red_pg_data:/var/lib/postgresql/data

volumes:
  bank_red_pg_data:
